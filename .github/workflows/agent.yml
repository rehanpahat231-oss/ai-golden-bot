name: 🎬 AI YouTube Shorts Generator

on:
  schedule:
    - cron: '0 10,18 * * *'  # 10 AM & 6 PM UTC daily
  workflow_dispatch:           # Manual trigger

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg imagemagick libsm6 libxext6 libxrender-dev libgomp1
          ffmpeg -version | head -1

      - name: 🔧 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q groq requests edge-tts moviepy imageio-ffmpeg librosa scipy pillow python-dotenv loguru

      - name: 🔑 Configure Secrets
        run: |
          cat > .env << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EOF

      - name: 📁 Create Directories
        run: |
          mkdir -p output logs

      - name: 🤖 Run AI Agent
        run: |
          python main.py
        continue-on-error: false

      - name: 📦 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: shorts-${{ github.run_id }}
          path: |
            output/
            logs/
          retention-days: 30

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🎬 AI Shorts Generator" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          if [ -d "output" ]; then
            COUNT=$(find output -name "*.mp4" 2>/dev/null | wc -l)
            echo "**Videos:** $COUNT created" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "logs/agent.log" ]; then
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -15 logs/agent.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
